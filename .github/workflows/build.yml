name: Build RTL8188FU for S22
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt update && sudo apt install -y gcc-aarch64-linux-gnu make git bc libelf-dev libssl-dev
      - name: Clone matching kernel
        run: git clone --depth 1 https://github.com/bruhduded/android_kernel_samsung_r0q -b 13 kernel || git clone --depth 1 https://android.googlesource.com/kernel/common -b android12-5.10 kernel
      - name: Build
        run: |
          cd kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)
          cd ..
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KSRC=$PWD/kernel EXTRA_CFLAGS="-Wno-error=all" -j$(nproc)
      - uses: actions/upload-artifact@v4
        with:
          name: rtl8188fu_S22
          path: rtl8188fu.ko
