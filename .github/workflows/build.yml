name: Build RTL8188FU for S22
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt update && sudo apt install -y gcc-aarch64-linux-gnu make git bc libelf-dev libssl-dev
      - name: Clone kernel source
        run: |
          git clone --depth 1 https://x-access-token:${{ github.token }}@github.com/LineageOS/android_kernel_samsung_sm8450 -b lineage-20 kernel
      - name: Prepare kernel
        run: |
          cd kernel
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare -j$(nproc)
      - name: Build driver
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- KSRC=$GITHUB_WORKSPACE/kernel EXTRA_CFLAGS="-Wno-error" -j$(nproc)
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rtl8188fu_S22
          path: rtl8188fu.ko
